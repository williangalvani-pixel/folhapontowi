
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle de Ponto</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>

body{
font-family:Segoe UI,Arial;
background:#f4f6fa;
margin:0;
}

header{
background:#0f172a;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
width:95%;
max-width:1200px;
margin:auto;
}

.info{
background:white;
padding:15px;
margin-top:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
display:flex;
gap:20px;
flex-wrap:wrap;
}

.info input{
border:1px solid #ddd;
padding:5px;
border-radius:4px;
}

.toolbar{
display:flex;
gap:10px;
margin:20px 0;
flex-wrap:wrap;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#1e40af;
color:white;
padding:10px;
}

td{
border-bottom:1px solid #eee;
padding:8px;
text-align:center;
}

input[type=time],input[type=date]{
border:none;
background:transparent;
text-align:center;
width:100%;
}

.resumo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;
}

.box{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

.extra{color:#16a34a}
.falta{color:#dc2626}

.sabado{background:#eef2ff}
.domingo{background:#fee2e2}

.btnExcluir{
background:#ef4444;
}

</style>

</head>

<body>

<header>Controle de Ponto</header>

<div class="container">

<div class="info">

<div>
<label>Empresa</label><br>
<input id="empresa">
</div>

<div>
<label>Funcionário</label><br>
<input id="funcionario">
</div>

<div>
<label>Mês de referência</label><br>
<input id="mesReferencia" type="month">
</div>

<div style="display:flex;align-items:end">
<button onclick="gerarPeriodo()">Gerar período 21 → 20</button>
</div>

</div>

<div class="toolbar">

<button onclick="adicionarLinha()">Adicionar dia</button>
<button onclick="calcular()">Calcular</button>
<button onclick="exportarPDF()">Exportar PDF</button>

</div>

<div class="card">

<table id="tabelaPonto">

<thead>

<tr>
<th>Data</th>
<th>Dia</th>
<th>Entrada 1</th>
<th>Saída 1</th>
<th>Entrada 2</th>
<th>Saída 2</th>
<th>Horas</th>
<th>Extra</th>
<th>Falta</th>
<th></th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<div class="resumo">

<div class="box">
Total trabalhado
<span id="totalHoras">0h</span>
</div>

<div class="box">
Horas extras
<span id="totalExtra" class="extra">0h</span>
</div>

<div class="box">
Horas faltas
<span id="totalFalta" class="falta">0h</span>
</div>

<div class="box">
Saldo de Horas
<span id="saldoHoras">0h</span>
</div>

</div>

</div>

<script>

const tbody=document.querySelector("#tabelaPonto tbody")

const dias=[
"Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"
]

function gerarPeriodo(){

const mesRef=document.getElementById("mesReferencia").value

if(!mesRef){
alert("Selecione o mês de referência")
return
}

const [ano,mes]=mesRef.split("-").map(Number)

const inicio=new Date(ano,mes-2,21)
const fim=new Date(ano,mes-1,20)

tbody.innerHTML=""

let dataAtual=new Date(inicio)

while(dataAtual<=fim){

const ano=dataAtual.getFullYear()
const mes=String(dataAtual.getMonth()+1).padStart(2,"0")
const dia=String(dataAtual.getDate()).padStart(2,"0")

const data=`${ano}-${mes}-${dia}`

criarLinha(data)

dataAtual.setDate(dataAtual.getDate()+1)

}

}

function criarLinha(data=""){

const tr=document.createElement("tr")

tr.innerHTML=`

<td><input type="date" value="${data}"></td>
<td class="dia"></td>

<td><input type="time"></td>
<td><input type="time"></td>
<td><input type="time"></td>
<td><input type="time"></td>

<td>0h</td>
<td class="extra">0h</td>
<td class="falta">0h</td>

<td><button class="btnExcluir">X</button></td>
`

tbody.appendChild(tr)

tr.querySelectorAll("input").forEach(i=>{
i.addEventListener("change",()=>{
verificarDia(tr)
calcular()
})
})

tr.querySelector(".btnExcluir").onclick=()=>{
tr.remove()
calcular()
}

verificarDia(tr)

}

function verificarDia(tr){

const data=tr.querySelector("input[type=date]").value
const cel=tr.querySelector(".dia")

tr.classList.remove("sabado","domingo")

if(!data) return

const d=new Date(data+"T00:00").getDay()

cel.innerText=dias[d]

if(d===6) tr.classList.add("sabado")
if(d===0) tr.classList.add("domingo")

}

function adicionarLinha(){
criarLinha()
}

function diff(a,b){

const[h1,m1]=a.split(":").map(Number)
const[h2,m2]=b.split(":").map(Number)

return(h2*60+m2)-(h1*60+m1)

}

function fmt(min){

const h=Math.floor(min/60)
const m=min%60

return `${h}h ${m}m`

}

function calcular(){

let total=0
let extra=0
let falta=0

document.querySelectorAll("#tabelaPonto tbody tr").forEach(tr=>{

const t=tr.querySelectorAll("input[type=time]")

let min=0

if(t[0].value && t[1].value)
min+=diff(t[0].value,t[1].value)

if(t[2].value && t[3].value)
min+=diff(t[2].value,t[3].value)

const data=tr.querySelector("input[type=date]").value

let carga=480

if(data){

const d=new Date(data+"T00:00").getDay()

if(d===6) carga=240
if(d===0) carga=0

}

tr.cells[6].innerText=fmt(min)

if(min>carga){

tr.cells[7].innerText=fmt(min-carga)
tr.cells[8].innerText="0h"
extra+=min-carga

}else{

tr.cells[7].innerText="0h"
tr.cells[8].innerText=fmt(carga-min)
falta+=carga-min

}

total+=min

})

document.getElementById("totalHoras").innerText=fmt(total)
document.getElementById("totalExtra").innerText=fmt(extra)
document.getElementById("totalFalta").innerText=fmt(falta)

const saldo=extra-falta
const saldoEl=document.getElementById("saldoHoras")

saldoEl.innerText=fmt(Math.abs(saldo))

if(saldo>0) saldoEl.style.color="#16a34a"
else if(saldo<0) saldoEl.style.color="#dc2626"
else saldoEl.style.color="#000"

}

new Sortable(tbody,{animation:150})

function formatarDataBR(data){
if(!data) return ""
const [ano,mes,dia]=data.split("-")
return `${dia}/${mes}/${ano}`
}

function exportarPDF(){

const { jsPDF } = window.jspdf
const doc = new jsPDF("p","mm","a4")

const empresa=document.getElementById("empresa").value
const funcionario=document.getElementById("funcionario").value
const mes=document.getElementById("mesReferencia").value

doc.setFillColor(15,23,42)
doc.rect(0,0,210,28,'F')

doc.setTextColor(255,255,255)
doc.setFontSize(18)
doc.text("FOLHA DE PONTO",14,16)

doc.setFontSize(10)
doc.text("Controle de Jornada de Trabalho",14,22)

doc.setTextColor(0,0,0)
doc.setFontSize(11)

doc.text(`Empresa: ${empresa}`,14,38)
doc.text(`Funcionário: ${funcionario}`,14,45)
doc.text(`Mês referência: ${mes}`,14,52)

const headers=["Data","Dia","Entrada 1","Saída 1","Entrada 2","Saída 2","Horas","Extra","Falta"]

const body=[]

document.querySelectorAll("#tabelaPonto tbody tr").forEach(tr=>{

const tds=tr.querySelectorAll("td")

body.push([
formatarDataBR(tds[0].querySelector("input").value),
tds[1].innerText,
tds[2].querySelector("input").value,
tds[3].querySelector("input").value,
tds[4].querySelector("input").value,
tds[5].querySelector("input").value,
tds[6].innerText,
tds[7].innerText,
tds[8].innerText
])

})

doc.autoTable({
startY:60,
head:[headers],
body:body,
styles:{fontSize:9,halign:"center"},
headStyles:{fillColor:[30,64,175],textColor:255},
alternateRowStyles:{fillColor:[245,247,250]}
})

const total=document.getElementById("totalHoras").innerText
const extra=document.getElementById("totalExtra").innerText
const falta=document.getElementById("totalFalta").innerText
const saldo=document.getElementById("saldoHoras").innerText

const y=doc.lastAutoTable.finalY+10

doc.text(`Total trabalhado: ${total}`,14,y)
doc.text(`Horas extras: ${extra}`,14,y+7)
doc.text(`Horas faltas: ${falta}`,14,y+14)
doc.text(`Saldo de horas: ${saldo}`,14,y+21)

const assinaturaY=y+40

doc.line(20,assinaturaY,90,assinaturaY)
doc.text("Assinatura do Funcionário",28,assinaturaY+6)

doc.line(120,assinaturaY,190,assinaturaY)
doc.text("Assinatura do Responsável",130,assinaturaY+6)

doc.save("folha_ponto.pdf")

}

</script>

</body>
</html>
```
