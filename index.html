<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Ponto</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body{font-family:Segoe UI,Arial;background:#f4f6fa;margin:0;}
header{background:#0f172a;color:white;padding:20px;font-size:22px;font-weight:bold;}
.container{width:95%;max-width:1200px;margin:auto;}
.info{background:white;padding:15px;margin-top:20px;border-radius:8px;display:flex;gap:20px;flex-wrap:wrap;}
.info input{border:1px solid #ddd;padding:5px;border-radius:4px;}
.toolbar{display:flex;gap:10px;margin:20px 0;flex-wrap:wrap;}
button{background:#2563eb;color:white;border:none;padding:10px 15px;border-radius:6px;cursor:pointer;}
.card{background:white;padding:15px;border-radius:10px;}
table{width:100%;border-collapse:collapse;}
th{background:#1e40af;color:white;padding:10px;}
td{border-bottom:1px solid #eee;padding:8px;text-align:center;}
input[type=time],input[type=date]{border:none;background:transparent;text-align:center;width:100%;}
.resumo{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-top:20px;}
.box{background:white;padding:15px;border-radius:8px;text-align:center;}
.extra{color:#16a34a}
.falta{color:#dc2626}
.btnExcluir{background:#ef4444;}
</style>
</head>

<body>

<header>Controle de Ponto</header>

<!-- LOGIN -->
<div id="loginBox" style="padding:20px">
<h2>Login</h2>
<input id="email" placeholder="Email"><br><br>
<input id="senha" type="password" placeholder="Senha"><br><br>
<button onclick="login()">Entrar</button>
<button onclick="registrar()">Criar conta</button>
</div>

<div class="container" id="app" style="display:none;">

<div class="info">
<div><label>Empresa</label><br><input id="empresa"></div>
<div><label>Funcionário</label><br><input id="funcionario"></div>
<div><label>Mês</label><br><input id="mesReferencia" type="month"></div>
<div style="display:flex;align-items:end">
<button onclick="gerarPeriodo()">Gerar período</button>
</div>
</div>

<div class="toolbar">
<button onclick="adicionarLinha()">Adicionar dia</button>
<button onclick="calcular()">Calcular</button>
<button onclick="exportarPDF()">Exportar PDF</button>
<button onclick="salvarDados()">Salvar na nuvem</button>
</div>

<div class="card">
<table id="tabelaPonto">
<thead>
<tr>
<th>Data</th><th>Dia</th><th>E1</th><th>S1</th><th>E2</th><th>S2</th>
<th>Horas</th><th>Extra</th><th>Falta</th><th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJG18iukUDf07qzvh5nNyErOYAUuSNmAk",
  authDomain: "folha-ponto-ef928.firebaseapp.com",
  projectId: "folha-ponto-ef928",
  storageBucket: "folha-ponto-ef928.firebasestorage.app",
  messagingSenderId: "812956983184",
  appId: "1:812956983184:web:8ef320b5393c9d7a4e9d15"
};

const app = initializeApp(firebaseConfig);
window.auth = getAuth(app);
window.db = getFirestore(app);
window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
window.signInWithEmailAndPassword = signInWithEmailAndPassword;
window.addDoc = addDoc;
window.collection = collection;
</script>

<script>
const tbody=document.querySelector("#tabelaPonto tbody")

function registrar(){
createUserWithEmailAndPassword(auth,email.value,senha.value)
.then(()=>alert("Conta criada!"))
.catch(e=>alert(e.message))
}

function login(){
signInWithEmailAndPassword(auth,email.value,senha.value)
.then(()=>{
loginBox.style.display="none"
app.style.display="block"
})
.catch(e=>alert(e.message))
}

function criarLinha(data=""){
const tr=document.createElement("tr")
tr.innerHTML=`
<td><input type="date" value="${data}"></td>
<td></td>
<td><input type="time"></td>
<td><input type="time"></td>
<td><input type="time"></td>
<td><input type="time"></td>
<td>0h</td><td>0h</td><td>0h</td>
<td><button onclick="this.parentElement.parentElement.remove()">X</button></td>
`
tbody.appendChild(tr)
}

function adicionarLinha(){criarLinha()}

function gerarPeriodo(){
tbody.innerHTML=""
for(let i=1;i<=30;i++){
criarLinha(`2025-01-${String(i).padStart(2,"0")}`)
}
}

function calcular(){}

async function salvarDados(){
const dados=[]
document.querySelectorAll("tbody tr").forEach(tr=>{
const t=tr.querySelectorAll("input")
dados.push({
data:t[0].value,
e1:t[1].value,
s1:t[2].value,
e2:t[3].value,
s2:t[4].value
})
})

await addDoc(collection(db,"pontos"),{
empresa:empresa.value,
funcionario:funcionario.value,
dados:dados,
data:new Date()
})

alert("Salvo!")
}
</script>

</body>
</html>
